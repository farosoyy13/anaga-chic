<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أناقة CHIC | بوابة الأناقة الملكية الفاخرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root { --primary: #800020; --secondary: #D4AF37; --dark: #1A1A1A; --light: #FDFBF7; --gray: #7F8C8D; --success: #27AE60; --red-alert: #C0392B; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
    body { background-color: var(--light); color: var(--dark); overflow-x: hidden; }
    
    #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .auth-card { background: white; padding: 35px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 440px; text-align: center; border: 2px solid var(--secondary); }
    .new-look-banner { background: linear-gradient(45deg, #4A0012, var(--primary), #4A0012); color: white; text-align: center; padding: 14px 20px; font-weight: 800; animation: bannerBlink 3s infinite; }
    @keyframes bannerBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.9; } }
    
    header { background-color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .logo { font-size: 1.6rem; font-weight: 900; color: var(--primary); }
    .logo span { color: var(--secondary); }
    
    .live-stats-container { background-color: white; margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #F0EAE1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
    .stat-number { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
    
    .ad-card { background: white; border: 1px solid #F0EAE1; border-radius: 12px; padding: 15px; margin: 15px; border-right: 5px solid var(--primary); }
    .ad-item-title { font-weight: 800; color: var(--primary); }
    .ad-item-price { font-weight: 900; color: var(--secondary); font-size: 1.05rem; }
    
    /* التأثيرات والوسوم */
    .golden-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); } }
    .ad-tag-group { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; padding: 15px; }
    .tag { background: #eee; padding: 4px 12px; border-radius: 4px; font-size: 0.9rem; }
    .golden-gen { border: 2px solid var(--secondary); margin: 15px; padding: 15px; border-radius: 15px; background: #fff; }
    
    .app-page { display: none; }
    .active-page { display: block; }
  </style>
</head>
<body>

  <div id="root">
    <header>
      <div class="logo">أناقة <span>CHIC</span></div>
    </header>

    <main>
      <section class="new-look-banner">بوابة الأناقة الملكية الفاخرة</section>
      
      <section class="live-stats-container">
        <div class="stat-box"><div class="stat-number">250+</div><div class="stat-label">منتج</div></div>
        <div class="stat-box"><div class="stat-number">100%</div><div class="stat-label">رضا عملاء</div></div>
      </section>

      <section class="ad-tag-group">
        <div class="tag">عبايات</div>
        <div class="tag">فساتين</div>
        <div class="tag">حقائب</div>
        <div class="tag">إكسسوارات</div>
      </section>

      <section class="golden-gen golden-pulse">
        <h2>الجيل الذهبي</h2>
        <p>تشكيلة مميزة من الجلابيات والبرقع الفاخر</p>
      </section>

      <div class="ad-card">
        <div class="ad-item-title">عباية ملكية فاخرة</div>
        <div class="ad-item-price">450 ريال</div>
      </div>
    </main>
  </div>

  <script>
    console.log("Anaqa CHIC System Loaded Successfully");
  </script>
</body>
</html>
